# ============================================================
# 植百汇官网 · Nginx 1.8.x 兼容配置（nginx-zhi100hui.conf）
# 适用：nginx/1.8.1 + OpenSSL 1.0.1e（无 HTTP/2、无 TLS 1.3）
#
# 【干净 URL 映射表 · 目录 + index.html】
#   /guanyu/  →  guanyu/index.html   （其余子页同理）
#   核心：root + index index.html + try_files $uri $uri/ =404;
#
# 部署：
#   1. 网站文件已在 /var/www/zhi100hui
#   2. cp 本文件到 /etc/nginx/conf.d/nginx-zhi100hui.conf（文件名保持一致，无需再改）
#   3. 修改 ssl_certificate / ssl_certificate_key（有证书后）
#   4. nginx -t && nginx -s reload
#
# 尚无 HTTPS 证书：注释掉上面三个 server，改用文件末尾「纯 HTTP 版」。
# 域名：zhi100hui.com 与 www 统一收口到 https://www.zhi100hui.com（路径不变）
# ============================================================

# --- HTTP：80 → HTTPS（裸域 + www 均跳 www）---
server {
    listen 80;
    server_name zhi100hui.com www.zhi100hui.com;
    return 301 https://www.zhi100hui.com$request_uri;
}

# --- HTTPS：裸域 zhi100hui.com → www ---
server {
    listen 443 ssl;
    server_name zhi100hui.com;

    ssl_certificate     /etc/nginx/ssl/zhi100hui.com.crt;
    ssl_certificate_key /etc/nginx/ssl/zhi100hui.com.key;
    ssl_protocols TLSv1.2;

    return 301 https://www.zhi100hui.com$request_uri;
}

# --- HTTPS：主站 www（1.8.x：用 ssl，勿写 http2）---
server {
    listen 443 ssl;
    server_name www.zhi100hui.com;

    ssl_certificate     /etc/nginx/ssl/zhi100hui.com.crt;
    ssl_certificate_key /etc/nginx/ssl/zhi100hui.com.key;
    ssl_protocols TLSv1.2;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /var/www/zhi100hui;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 英文路径 /cities/ → 正式页 /chengshi/（301，canonical 仍为 chengshi，避免重复收录）
    location = /cities {
        return 301 https://www.zhi100hui.com/chengshi/;
    }
    location = /cities/ {
        return 301 https://www.zhi100hui.com/chengshi/;
    }
    location ~ ^/cities/([a-z]+)/?$ {
        return 301 https://www.zhi100hui.com/chengshi/$1/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpe?g|webp|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    error_page 404 = @notfound;
    location @notfound {
        try_files /404.html =404;
    }
}

