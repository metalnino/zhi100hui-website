# ============================================================
# 植百汇官网 · Nginx 纯静态部署配置（nginx ≥ 1.9.5，支持 http2 / TLS 1.3）
# 若服务器为 nginx 1.8.x，请改用同目录 nginx-zhi100hui.conf
# 部署方式：把「官网」目录下所有文件上传到 root 指定目录，例如 /var/www/zhi100hui
# 测试配置：nginx -t   重新加载：nginx -s reload
# ============================================================

# --- HTTP：80 端口，统一跳转到 https + www ---
server {
    listen 80;
    listen [::]:80;
    server_name zhi100hui.com www.zhi100hui.com;
    # 如暂未配 HTTPS，可先注释下一行、改用本文件末尾“纯 HTTP 版”
    return 301 https://www.zhi100hui.com$request_uri;
}

# --- HTTPS：主站 ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.zhi100hui.com;

    # SSL 证书（用 certbot/Let's Encrypt 或云厂商证书，替换为真实路径）
    ssl_certificate     /etc/nginx/ssl/zhi100hui.com.crt;
    ssl_certificate_key /etc/nginx/ssl/zhi100hui.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 站点根目录（把「官网」目录内容放这里）
    root  /var/www/zhi100hui;
    index index.html;
    charset utf-8;

    # gzip 压缩（HTML/CSS/JS/SVG）
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 目录式 URL：/guanyu/ → guanyu/index.html
    location / {
        try_files $uri $uri/ =404;
    }

    # 把 xxx.html 永久跳到干净 URL（利于 SEO/GEO，避免重复内容）
    location ~ ^/(.+)\.html$ {
        return 301 /$1/;
    }
    # 首页特殊处理：/index/ 跳回根
    location = /index/ { return 301 /; }

    # 静态资源长缓存
    location ~* \.(?:css|js|png|jpe?g|webp|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 安全响应头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # 404 页面：用命名 location 直接吐 404.html 内容，避开上面的 .html→干净URL 跳转，避免循环
    error_page 404 = @notfound;
    location @notfound {
        try_files /404.html =404;
    }
}

# ============================================================
